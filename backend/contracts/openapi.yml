        adminName:
          type: string
        adminPassword:
          type: string
          minLength: 8
        active:
          type: boolean

    TestPlatformTenantConnectionRequest:
      type: object
      required: [dbConnectionUrl]
      properties:
        dbConnectionUrl:
          type: string

    PlatformLoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    CreatePlatformAdminRequest:
      type: object
      required: [email, name, password]
      properties:
        email:
          type: string
          format: email
        name:
          type: string
        password:
          type: string
          minLength: 8
        active:
          type: boolean

    UpdatePlatformAdminRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        name:
          type: string
        password:
          type: string
          minLength: 8
        active:
          type: boolean

    UpdatePlatformTenantRequest:
      type: object
      properties:
        slug:
          type: string
        name:
          type: string
        dbConnectionUrl:
          type: string
        active:
          type: boolean

    SuccessResponse:
      type: object

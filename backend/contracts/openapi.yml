      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    LoginEmailRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    LoginGoogleRequest:
      type: object
      required: [idToken]
      properties:
        idToken:
          type: string

    LoginFacebookRequest:
      type: object
      required: [accessToken]
      properties:
        accessToken:
          type: string

    LoginAppleRequest:
      type: object
      required: [idToken]
      properties:
        idToken:
          type: string

    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
          minLength: 20

    LogoutRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
          minLength: 20

    VerifyEmailRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
          minLength: 20

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    ResetPasswordRequest:
      type: object
      required: [token, newPassword]
      properties:
        token:
          type: string
          minLength: 20
        newPassword:
          type: string
          minLength: 8

    LoginUnifiedRequest:
      oneOf:
        - type: object
          required: [type, email, password]
          properties:
            type:
              type: string
              enum: [email]
            email:
              type: string
              format: email
            password:
              type: string
              minLength: 8
        - type: object
          required: [type, provider, token]
          properties:
            type:
              type: string
              enum: [social]
            provider:
              type: string
              enum: [google, facebook, apple]
            token:
              type: string

    LinkIdentityRequest:
      type: object
      required: [provider, token]
      properties:
        provider:
          type: string
          enum: [google, facebook, apple]
        token:
          type: string

    UpdatePreferencesRequest:
      type: object
      properties:
        marketingOptIn:
          type: boolean
        acceptTerms:
          type: boolean
        acceptPrivacy:
          type: boolean

    CreateUserRequest:
      type: object
      required: [name]
      properties:
        tenantId:
          type: string
          format: uuid
          nullable: true
        email:
          type: string
          format: email
          nullable: true
        name:
          type: string
        imageUrl:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        birthDate:
          type: string
          format: date-time
          nullable: true
        gender:
          type: string
          nullable: true
        role:
          type: string
          enum: [CUSTOMER, TENANT_STAFF, TENANT_ADMIN]
        password:
          type: string
          minLength: 8

    UpdateUserRequest:
      type: object
      properties:
        tenantId:
          type: string
          format: uuid
          nullable: true
        email:
          type: string
          format: email
          nullable: true
        name:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        birthDate:
          type: string
          format: date-time
          nullable: true
        gender:
          type: string
          nullable: true
        role:
          type: string
          enum: [CUSTOMER, TENANT_STAFF, TENANT_ADMIN]
        password:
          type: string
          minLength: 8

    UpdateMeRequest:
      type: object
      properties:
        name:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        birthDate:
          type: string
          format: date-time
          nullable: true
        gender:
          type: string
          nullable: true

    CreatePlatformTenantRequest:
      type: object
      required: [slug, name, dbConnectionUrl]
      properties:
        slug:
          type: string
        name:
          type: string
        dbConnectionUrl:
          type: string
        active:
          type: boolean

    OnboardPlatformTenantRequest:
      type: object

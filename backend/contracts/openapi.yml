          $ref: '#/components/schemas/ConnectionTarget'

    PlatformAuthResponse:
      type: object
      required: [accessToken, user]
      properties:
        accessToken:
          type: string
        user:
          $ref: '#/components/schemas/PlatformAdmin'

    AuthResponse:
      type: object
      required: [accessToken, refreshToken, expiresAt, userId, sessionId, tenantId, customerId, user]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresAt:
          type: string
          format: date-time
        userId:
          type: string
          format: uuid
        sessionId:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
          nullable: true
        customerId:
          type: string
          format: uuid
          nullable: true
        user:
          $ref: '#/components/schemas/AuthUser'

    AuthResponseWithIdentity:
      allOf:
        - $ref: '#/components/schemas/AuthResponse'
        - type: object
          required: [identity]
          properties:
            identity:
              $ref: '#/components/schemas/AuthIdentity'

    RefreshResponse:
      type: object
      required: [accessToken, refreshToken, expiresAt, userId, sessionId, tenantId, customerId]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresAt:
          type: string
          format: date-time
        userId:
          type: string
          format: uuid
        sessionId:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
          nullable: true
        customerId:
          type: string
          format: uuid
          nullable: true

    AuthSessionView:
      type: object
      required: [id, createdAt, expiresAt, current]
      properties:
        id:
          type: string
          format: uuid
        userAgent:
          type: string
          nullable: true
        ipAddress:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        current:
          type: boolean

    LinkedIdentity:
      type: object
      required: [id, provider, linkedAt]
      properties:
        id:
          type: string
          format: uuid
        provider:
          type: string
          enum: [email, google, facebook, apple]
        email:
          type: string
          format: email
          nullable: true
        linkedAt:
          type: string
          format: date-time

    AuthPreferences:
      type: object
      required:
        [emailVerified, marketingOptIn]
      properties:
        emailVerified:
          type: boolean
        emailVerifiedAt:
          type: string
          format: date-time
          nullable: true
        marketingOptIn:
          type: boolean
        marketingConsentAt:
          type: string
          format: date-time
          nullable: true
        termsAcceptedAt:
          type: string
          format: date-time
          nullable: true
        privacyAcceptedAt:
          type: string
          format: date-time
          nullable: true

    AuthMetric:
      type: object
      required:
        [useCase, total, success, failure, avgDurationMs]
      properties:
        useCase:
          type: string
        total:
          type: integer
        success:
          type: integer
        failure:
          type: integer
        avgDurationMs:
          type: number
          format: double
        lastDurationMs:
          type: number
          format: double
          nullable: true
        lastStatus:
          type: string
          nullable: true
          enum: [success, failure]
        lastSeenAt:
          type: string
          format: date-time
          nullable: true

    AuthMetricsResponse:
      type: object
      required: [generatedAt, metrics]
      properties:
        generatedAt:
          type: string
          format: date-time
        metrics:
          type: array
          items:
            $ref: '#/components/schemas/AuthMetric'

    Catalog:
      type: object
      required: [id, name, active]
      properties:
        id:
          type: string
        name:
          type: string
        active:
          type: boolean

    Product:
      type: object
      required: [id, name, basePrice, active, catalogId]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        basePrice:
          type: number
          format: double
        active:
          type: boolean
        catalogId:
          type: string

    Inventory:
      type: object
      required: [productId, availableQuantity, reservedQuantity]
      properties:
        productId:
          type: string
        availableQuantity:
          type: integer
          minimum: 0
        reservedQuantity:
          type: integer
          minimum: 0

    Customer:
      type: object
      required: [id, name, email]
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        address:
          type: string

    Cart:
      type: object
      required: [id, customerId, status, items]
      properties:
        id:
          type: string
        customerId:
          type: string
        status:
          type: string
          enum: [ACTIVE, CHECKED_OUT]
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItem'

    CartItem:
      type: object
      required: [productId, quantity, unitbasePrice]
      properties:
        productId:
          type: string
        quantity:
          type: integer
          minimum: 1
        unitbasePrice:
          type: number
          format: double

    Order:
      type: object
      required: [id, customerId, status, total, items, createdAt]
      properties:
        id:
          type: string
        customerId:
          type: string
        status:
          type: string
          enum: [PAID, PREPARING, READY, DELIVERED]
        total:
          type: number
          format: double
        createdAt:
          type: string
          format: date-time
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'

    OrderItem:
      type: object
      required: [productId, quantity, unitbasePrice]
      properties:
        productId:
          type: string
        quantity:
          type: integer
        unitbasePrice:
          type: number
          format: double

    LoyaltyAccount:
      type: object
      required: [customerId, points]
      properties:
        customerId:
          type: string
        points:
          type: integer
          minimum: 0

security:
  - bearerAuth: []

openapi: 3.0.3
info:
  title: Food Commerce API
  description: API First contract for modular monolithic food e-commerce
  version: 1.0.0

servers:
  - url: http://localhost:3000/api/v1

tags:
  - name: Auth
  - name: Users
  - name: Platform
  - name: Health
  - name: Catalog
  - name: Products
  - name: Inventory
  - name: Cart
  - name: Orders
  - name: Customers
  - name: Loyalty

paths:
  /auth/signup/email:
    post:
      tags: [Auth]
      summary: Sign up with email and password
      operationId: signupEmail
      security: []
      parameters:
        - name: x-guest-id
          in: header
          required: false
          schema:
            type: string
        - name: user-agent
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupEmailRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Validation error or email already registered

  /auth/login/email:
    post:
      tags: [Auth]
      summary: Log in with email and password
      operationId: loginEmail
      security: []
      parameters:
        - name: x-guest-id
          in: header
          required: false
          schema:
            type: string
        - name: user-agent
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginEmailRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid credentials

  /auth/login:
    post:
      tags: [Auth]
      summary: Unified login with email credentials or social provider
      operationId: loginUnified
      security: []
      parameters:
        - name: x-guest-id
          in: header
          required: false
          schema:
            type: string
        - name: user-agent
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginUnifiedRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/AuthResponse'
                  - $ref: '#/components/schemas/AuthResponseWithIdentity'
        '400':
          description: Invalid request body
        '401':
          description: Invalid credentials

  /auth/login/oauth/google:
    post:
      tags: [Auth]
      summary: Log in or sign up with Google
      operationId: loginGoogle
      security: []
      parameters:
        - name: x-guest-id
          in: header
          required: false
          schema:
            type: string
        - name: user-agent
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginGoogleRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponseWithIdentity'

  /auth/login/oauth/facebook:
    post:
      tags: [Auth]
      summary: Log in or sign up with Facebook
      operationId: loginFacebook
      security: []
      parameters:
        - name: x-guest-id
          in: header
          required: false
          schema:
            type: string
        - name: user-agent
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginFacebookRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponseWithIdentity'

  /auth/login/oauth/apple:
    post:
      tags: [Auth]
      summary: Log in or sign up with Apple
      operationId: loginApple
      security: []
      parameters:
        - name: x-guest-id
          in: header
          required: false
          schema:
            type: string
        - name: user-agent
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginAppleRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponseWithIdentity'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Rotate refresh token and issue a new session
      operationId: refreshSession
      security: []
      parameters:
        - name: user-agent
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
        '401':
          description: Invalid or expired refresh token

  /auth/logout:
    post:
      tags: [Auth]
      summary: Revoke the current refresh token
      operationId: logout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /auth/sessions:
    get:
      tags: [Auth]
      summary: List active sessions for the authenticated user
      operationId: listAuthSessions
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AuthSessionView'

  /auth/sessions/{sessionId}:
    delete:
      tags: [Auth]
      summary: Revoke one active session by id
      operationId: revokeAuthSession
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /auth/identities:
    get:
      tags: [Auth]
      summary: List linked identities for the authenticated user
      operationId: listLinkedIdentities
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LinkedIdentity'

  /auth/preferences:
    get:
      tags: [Auth]
      summary: Get auth preferences and legal consent status for the authenticated user
      operationId: getAuthPreferences
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthPreferences'
    patch:
      tags: [Auth]
      summary: Update marketing preferences and legal consent flags for the authenticated user
      operationId: updateAuthPreferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePreferencesRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthPreferences'

  /auth/identities/link:
    post:
      tags: [Auth]
      summary: Link a social identity to the authenticated user
      operationId: linkIdentity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LinkIdentityRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LinkedIdentity'
        '409':
          description: The social account is already linked or the provider is already linked

  /auth/observability/metrics:
    get:
      tags: [Auth]
      summary: Get in-memory auth metrics collected by the telemetry service
      operationId: getAuthMetrics
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthMetricsResponse'

  /auth/verify-email:
    post:
      tags: [Auth]
      summary: Verify the email address using a verification token
      operationId: verifyEmail
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Invalid token

  /auth/resend-verification:
    post:
      tags: [Auth]
      summary: Resend verification email to the authenticated user
      operationId: resendVerification
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
      responses:
        '201':
          description: Created

  /auth/password/forgot:
    post:
      tags: [Auth]
      summary: Request a password reset email
      operationId: forgotPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /auth/password/reset:
    post:
      tags: [Auth]
      summary: Reset password using a reset token
      operationId: resetPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Invalid token or unsupported credential type

  /users/me:
    get:
      tags: [Users]
      summary: Get the authenticated user profile
      operationId: getMyUser
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserView'
    patch:
      tags: [Users]
      summary: Update the authenticated user profile
      operationId: updateMyUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMeRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserView'

  /admin/users:
    get:
      tags: [Users]
      summary: List users in scope for the authenticated admin
      operationId: listUsers
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserView'
    post:
      tags: [Users]
      summary: Create a user profile and optional email credentials
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserView'
        '409':
          description: Email already used

  /admin/users/{id}:
    get:
      tags: [Users]
      summary: Get a user by id within admin scope
      operationId: getUserById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserView'
        '404':
          description: User not found
    patch:
      tags: [Users]
      summary: Update a user inside admin scope
      operationId: updateUser
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserView'
        '403':
          description: Outside tenant scope or insufficient role
        '404':
          description: User not found
        '409':
          description: Email already used
    delete:
      tags: [Users]
      summary: Delete a user inside admin scope
      operationId: deleteUser
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '403':
          description: Outside tenant scope or insufficient role
        '404':
          description: User not found

  /platform/tenants:
    get:
      tags: [Platform]
      summary: List platform tenants from the central platform database
      operationId: listPlatformTenants
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PlatformTenant'
    post:
      tags: [Platform]
      summary: Create a platform tenant entry with its dedicated database connection
      operationId: createPlatformTenant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePlatformTenantRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformTenant'
        '409':
          description: Platform tenant slug already exists

  /platform/tenants/onboard:
    post:
      tags: [Platform]
      summary: Onboard a tenant and create its initial tenant admin in the target database
      operationId: onboardPlatformTenant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OnboardPlatformTenantRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformTenantOnboardingResult'
        '409':
          description: Platform tenant slug already exists or initial tenant admin email already exists

  /platform/tenants/test-connection:
    post:
      tags: [Platform]
      summary: Validate a tenant database connection string without persisting anything
      operationId: testPlatformTenantConnection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TestPlatformTenantConnectionRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformTenantConnectionTestResult'
        '500':
          description: Tenant connection test failed

  /platform/admins:
    get:
      tags: [Platform]
      summary: List platform admins from the central platform database
      operationId: listPlatformAdmins
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PlatformAdmin'
    post:
      tags: [Platform]
      summary: Create a platform admin
      operationId: createPlatformAdmin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePlatformAdminRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformAdmin'
        '409':
          description: Platform admin email already exists

  /platform/auth/login:
    post:
      tags: [Platform]
      summary: Log in as a platform admin using the central platform database
      operationId: loginPlatformAdmin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlatformLoginRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformAuthResponse'
        '401':
          description: Invalid platform credentials

  /platform/auth/me:
    get:
      tags: [Platform]
      summary: Get the authenticated platform admin profile
      operationId: getPlatformAdminMe
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformAdmin'
        '401':
          description: Unauthorized

  /platform/admins/{id}:
    get:
      tags: [Platform]
      summary: Get one platform admin by id
      operationId: getPlatformAdmin
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformAdmin'
        '404':
          description: Platform admin not found
    patch:
      tags: [Platform]
      summary: Update a platform admin
      operationId: updatePlatformAdmin
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePlatformAdminRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformAdmin'
        '400':
          description: Cannot deactivate your own platform admin
        '404':
          description: Platform admin not found
        '409':
          description: Platform admin email already exists
    delete:
      tags: [Platform]
      summary: Delete a platform admin
      operationId: deletePlatformAdmin
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Cannot delete your own platform admin
        '404':
          description: Platform admin not found

  /platform/tenants/{id}:
    get:
      tags: [Platform]
      summary: Get one platform tenant by id
      operationId: getPlatformTenant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformTenant'
        '404':
          description: Platform tenant not found
    patch:
      tags: [Platform]
      summary: Update platform tenant metadata and database connection
      operationId: updatePlatformTenant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePlatformTenantRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformTenant'
        '404':
          description: Platform tenant not found
        '409':
          description: Platform tenant slug already exists
    delete:
      tags: [Platform]
      summary: Delete a platform tenant entry
      operationId: deletePlatformTenant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '404':
          description: Platform tenant not found

  /health:
    get:
      tags: [Health]
      summary: Get combined platform and tenant health checks
      operationId: getOverallHealth
      security: []
      responses:
        '200':
          description: OK
        '503':
          description: One or more dependencies are unavailable

  /health/platform:
    get:
      tags: [Health]
      summary: Check platform database connectivity
      operationId: getPlatformHealth
      security: []
      responses:
        '200':
          description: OK
        '503':
          description: Platform database unavailable

  /health/tenant:
    get:
      tags: [Health]
      summary: Check current tenant database connectivity
      operationId: getTenantHealth
      security: []
      responses:
        '200':
          description: OK
        '503':
          description: Tenant database unavailable

  /catalog:
    get:
      tags: [Catalog]
      summary: List catalogs
      operationId: listCatalogs
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Catalog'

  /products:
    get:
      tags: [Products]
      summary: List products
      operationId: listProducts
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'

  /products/{productId}:
    get:
      tags: [Products]
      summary: Get product detail
      operationId: getProduct
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'

  /inventory/{productId}:
    get:
      tags: [Inventory]
      summary: Get inventory status
      operationId: getInventory
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Inventory'

  /cart:
    post:
      tags: [Cart]
      summary: Add item to cart as guest or authenticated customer
      operationId: addToCart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CartItem'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'

  /orders:
    post:
      tags: [Orders]
      summary: Create order from the authenticated customer cart
      operationId: createOrder
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '403':
          description: Only customers can create orders
    get:
      tags: [Orders]
      summary: List orders for the authenticated customer
      operationId: listMyOrders
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'
        '403':
          description: Only customers can list their orders

  /customers/{customerId}:
    get:
      tags: [Customers]
      summary: Get the authenticated customer's own profile
      operationId: getCustomer
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
        '403':
          description: You can only access your own customer profile

  /loyalty/{customerId}:
    get:
      tags: [Loyalty]
      summary: Get the authenticated customer's own loyalty account
      operationId: getLoyalty
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoyaltyAccount'
        '403':
          description: You can only access your own loyalty account

  /admin/orders:
    get:
      tags: [Orders]
      summary: List orders (admin)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'

  /admin/orders/{orderId}/status:
    patch:
      tags: [Orders]
      summary: Advance order status (admin)
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK

  /admin/inventory/{productId}/adjust:
    patch:
      tags: [Inventory]
      summary: Adjust inventory manually (admin)
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [quantity]
              properties:
                quantity:
                  type: integer
      responses:
        '200':
          description: OK

  /admin/products/{id}/price:
    patch:
      tags: [Products]
      summary: Change product base price
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [price]
              properties:
                price:
                  type: number
                  format: double
      responses:
        '200':
          description: Product updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '404':
          description: Product not found

  /admin/catalogs/{id}/activate:
    patch:
      tags: [Catalog]
      summary: Activate catalog
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Catalog activated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Catalog'
        '404':
          description: Catalog not found

  /admin/loyalty/{customerId}/adjust:
    patch:
      tags: [Loyalty]
      summary: Adjust loyalty points manually
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [points]
              properties:
                points:
                  type: integer
      responses:
        '200':
          description: Loyalty updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoyaltyAccount'


components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

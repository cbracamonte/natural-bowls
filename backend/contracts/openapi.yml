    AuthIdentity:
      type: object
      required: [id, provider]
      properties:
        id:
          type: string
          format: uuid
        provider:
          type: string
          enum: [email, google, facebook, apple]

    AuthUser:
      type: object
      required: [id, email, name, emailVerified, role]
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
          nullable: true
        email:
          type: string
          format: email
          nullable: true
        name:
          type: string
        imageUrl:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        birthDate:
          type: string
          format: date-time
          nullable: true
        gender:
          type: string
          nullable: true
        emailVerified:
          type: boolean
        emailVerifiedAt:
          type: string
          format: date-time
          nullable: true
        marketingOptIn:
          type: boolean
        marketingConsentAt:
          type: string
          format: date-time
          nullable: true
        termsAcceptedAt:
          type: string
          format: date-time
          nullable: true
        privacyAcceptedAt:
          type: string
          format: date-time
          nullable: true
        role:
          type: string
          enum: [CUSTOMER, TENANT_STAFF, TENANT_ADMIN]

    UserView:
      allOf:
        - $ref: '#/components/schemas/AuthUser'
        - type: object
          required: [createdAt, updatedAt]
          properties:
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time

    PlatformTenant:
      type: object
      required: [id, slug, name, dbConnectionUrl, active, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        dbConnectionUrl:
          type: string
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PlatformAdmin:
      type: object
      required: [id, email, name, role, active, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string
          enum: [PLATFORM_ADMIN]
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    TenantBootstrapAdmin:
      type: object
      required: [id, tenantId, email, name, role]
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string
          enum: [TENANT_ADMIN]

    PlatformTenantOnboardingResult:
      type: object
      required: [tenant, initialAdmin]
      properties:
        tenant:
          $ref: '#/components/schemas/PlatformTenant'
        initialAdmin:
          $ref: '#/components/schemas/TenantBootstrapAdmin'

    ConnectionTarget:
      type: object
      required: [protocol, username, host, port, database]
      properties:
        protocol:
          type: string
          nullable: true
        username:
          type: string
          nullable: true
        host:
          type: string
          nullable: true
        port:
          type: string
          nullable: true
        database:
          type: string
          nullable: true

    PlatformTenantConnectionTestResult:
      type: object
      required: [success, target]
      properties:
        success:
          type: boolean
